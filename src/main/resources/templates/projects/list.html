<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
        <h1 class="h2 fw-bold text-dark">Verfügbare Projekte</h1>
        <a th:href="@{/projects/create}" class="btn btn-success rounded-pill px-4 shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> Neues Projekt
        </a>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-4 mb-4" th:each="project : ${projects}">
            <div class="card h-100 shadow-sm border-0 transition-hover">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-3 text-primary">
                            <i class="bi bi-folder2-open fs-4"></i>
                        </div>
                        <span class="badge bg-light text-dark border rounded-pill px-3 py-2">
                            <i class="bi bi-people me-1"></i> <span th:text="${project.users.size()}">0</span>
                        </span>
                    </div>
                    <h5 class="card-title fw-bold mb-2" th:text="${project.name}">Projekt Name</h5>
                    <p class="card-text text-muted line-clamp-3" th:text="${project.description}">Beschreibung...</p>
                </div>
                <div class="card-footer bg-light border-0 p-3">
                    <div class="row g-2">
                        <div class="col-6">
                            <form th:action="@{/projects/join/{id}(id=${project.id})}" method="post">
                                <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">Beitreten</button>
                            </form>
                        </div>
                        <div class="col-6">
                            <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-outline-secondary w-100 rounded-pill">Details</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 text-center py-5 bg-white rounded-4 shadow-sm" th:if="${projects.empty}">
            <i class="bi bi-kanban display-1 text-muted opacity-25 mb-4"></i>
            <h3 class="fw-bold">Noch keine Projekte</h3>
            <p class="text-muted lead mb-4">Sei der Erste und erstelle ein neues Projekt für dein Team.</p>
            <a th:href="@{/projects/create}" class="btn btn-primary btn-lg rounded-pill px-5 shadow">Projekt erstellen</a>
        </div>
    </div>
</section>
</body>
</html>
