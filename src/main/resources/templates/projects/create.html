<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Neues Projekt</h1>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/projects/create}" th:object="${project}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Projektname</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" required placeholder="z.B. Schul-Webseite">
                </div>
                <div class="mb-4">
                    <label for="description" class="form-label fw-bold">Beschreibung</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Worum geht es in diesem Projekt?"></textarea>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/projects}" class="btn btn-light rounded-pill px-4">Abbrechen</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Projekt erstellen</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
