<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TapTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --dark-bg: #121212;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            padding: 40px;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        .brand-name {
            font-weight: 800;
            background: linear-gradient(90deg, #0d6efd, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
            text-align: center;
        }
        .btn-primary {
            padding: 12px;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="login-card">
        <a th:href="@{/}" class="text-decoration-none"><span class="brand-name">TapTrack</span></a>
        <h3 class="text-center mb-4 fw-bold">Willkommen zurück</h3>
        
        <div th:if="${param.error}" class="alert alert-danger border-0 rounded-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Ungültiger Benutzername oder Passwort.
        </div>
        <div th:if="${param.logout}" class="alert alert-info border-0 rounded-3">
            <i class="bi bi-info-circle-fill me-2"></i> Sie wurden erfolgreich abgemeldet.
        </div>
        <div th:if="${param.success}" class="alert alert-success border-0 rounded-3">
            <i class="bi bi-check-circle-fill me-2"></i> Registrierung erfolgreich. Einloggen möglich.
        </div>
        <div th:if="${param.deleted}" class="alert alert-warning border-0 rounded-3">
            <i class="bi bi-trash-fill me-2"></i> Ihr Konto wurde erfolgreich gelöscht.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Benutzername</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 rounded-end-3" id="username" name="username" placeholder="Dein Benutzername" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Passwort</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 rounded-end-3" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm">Einloggen</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted mb-0">Noch kein Konto? <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">Hier registrieren</a></p>
        </div>
    </div>
</div>
</body>
</html>
