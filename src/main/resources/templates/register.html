<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung - TapTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --dark-bg: #121212;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            padding: 40px;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        .brand-name {
            font-weight: 800;
            background: linear-gradient(90deg, #0d6efd, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
            text-align: center;
        }
        .btn-primary {
            padding: 12px;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="register-card">
        <a th:href="@{/}" class="text-decoration-none"><span class="brand-name">TapTrack</span></a>
        <h3 class="text-center mb-4 fw-bold">Neues Konto erstellen</h3>
        
        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="username" class="form-label fw-semibold">Benutzername</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" th:field="*{username}" class="form-control border-start-0 rounded-end-3" id="username" placeholder="Nutzername" required>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label fw-semibold">E-Mail Adresse</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" th:field="*{email}" class="form-control border-start-0 rounded-end-3" id="email" placeholder="name@beispiel.de" required>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="firstName" class="form-label fw-semibold">Vorname</label>
                    <input type="text" th:field="*{firstName}" class="form-control" id="firstName" placeholder="Max">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="lastName" class="form-label fw-semibold">Nachname</label>
                    <input type="text" th:field="*{lastName}" class="form-control" id="lastName" placeholder="Mustermann">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Passwort</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 rounded-start-3"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" th:field="*{password}" class="form-control border-start-0 rounded-end-3" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-text text-muted">Nutze mindestens 8 Zeichen für deine Sicherheit.</div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3 shadow-sm">Konto erstellen</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-muted mb-0">Bereits ein Konto? <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Hier einloggen</a></p>
        </div>
    </div>
</div>
</body>
</html>
